name: Refactor Checks

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  refactor-checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Run refactor checks
        run: npm run check:refactor
