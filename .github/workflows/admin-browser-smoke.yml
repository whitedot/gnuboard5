name: Admin Browser Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL for the running G5 instance
        required: true
        default: http://127.0.0.1/g5
  repository_dispatch:
    types:
      - admin-browser-smoke

jobs:
  admin-browser-smoke:
    runs-on: windows-latest

    env:
      G5_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || github.event.client_payload.base_url }}
      G5_ADMIN_ID: ${{ secrets.G5_ADMIN_ID }}
      G5_ADMIN_PASSWORD: ${{ secrets.G5_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run admin browser smoke
        run: npm run check:admin-browser-smoke
